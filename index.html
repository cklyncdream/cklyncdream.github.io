<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dream Soft</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="terminal">
    <div id="terminal-content"></div>
  </div>

  <div id="logo-screen" class="hidden">
    <h1>Dream Soft</h1>
    <p>By. Severus Salvadore Rexuexuel&lt;/&gt;</p>
  </div>

  <div id="password-screen" class="hidden">
    <input type="password" id="password-input" placeholder="Şifreyi giriniz">
    <button onclick="checkPassword()">Giriş Yap</button>
    <p id="password-error"></p>
  </div>

  <div id="captcha-screen" class="hidden">
    <p>Ben robot değilim</p>
    <button onclick="solveCaptcha()">✅</button>
  </div>

  <div id="main-site" class="hidden">
    <h2>🎉 Hoş Geldin Dream Soft!</h2>
    <div id="chat-box">
      <div id="messages"></div>
      <input type="text" id="chat-input" placeholder="Mesaj yaz..." onkeypress="handleEnter(event)">
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
