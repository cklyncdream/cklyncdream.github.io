<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kamera Uygulaması</title>
    <link rel="stylesheet" href="stil.css">
</head>
<body>
    <div class="container">
        <div class="camera-box">
            <video id="video" width="320" height="240" autoplay></video>
            <div class="controls">
                <button id="captureButton" class="btn">📸 Fotoğraf Çek</button>
                <button id="startVideo" class="btn">🎥 Video Başlat</button>
                <button id="stopVideo" class="btn">⏹️ Video Durdur</button>
            </div>
        </div>
        <div id="gallery" class="gallery">
            <h3>Galeriden Fotoğraf</h3>
            <div id="imageGallery"></div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
