<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Giriş Sistemi</title>
  <link rel="stylesheet" href="stil.css">
</head>
<body>

  <!-- Giriş Ekranı -->
  <div class="giris-ekrani">
    <h1>Lütfen Parolayı Giriniz</h1>
    <input type="password" id="parola" placeholder="Parolayı Gir...">
    <button onclick="girisYap()">Giriş Yap</button>
    <div id="sonuc" class="sonuc-mesaj"></div>
  </div>

  <!-- Başarı Ekranı -->
  <div class="basari-ekrani" id="basariEkrani">
    <h1>İşlem Başarılı</h1>
    <p>Sisteme giriş sağlanıyor...</p>
  </div>

  <!-- Yan Menü -->
  <div class="yan-menu" id="yanMenu">
    <div class="menu-item" onclick="menuAc()">≡</div>
    <div class="menu-content" id="menuContent">
      <div onclick="ayarlarAc()">Ayarlar</div>
      <div onclick="rollerAc()">Roller</div>
      <div onclick="kanallarAc()">Kanallar</div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
